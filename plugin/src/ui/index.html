<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prism3</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; padding: 16px;
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        color: var(--figma-color-text, #1e1e1e);
        background: var(--figma-color-bg, #fff);
      }
      h1 { font-size: 14px; margin: 0 0 4px; }
      p { margin: 0 0 12px; color: var(--figma-color-text-secondary, #666); }
      button {
        font: inherit; padding: 6px 12px; border-radius: 6px; cursor: pointer;
        border: 1px solid var(--figma-color-border, #ddd);
        background: var(--figma-color-bg-secondary, #f5f5f5);
        color: inherit;
      }
      #log {
        margin-top: 12px; padding: 8px; border-radius: 6px; min-height: 40px;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12px;
        background: var(--figma-color-bg-secondary, #f5f5f5);
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Prism3 — plugin scaffold</h1>
    <p>Phase 2 (#107): typed bridge. Phase 3 (#108): the write adapter. The real theming UI arrives in #110.</p>
    <button id="ping">Ping main thread</button>
    <button id="apply">Apply NB theme → variables</button>
    <button id="read">Read current file</button>
    <div id="log" aria-live="polite"></div>
    <script type="module" src="./ui.ts"></script>
  </body>
</html>
