<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prism3</title>
    <style>
      /* The shared web/src UI injects its own full stylesheet into <head> at boot; this only
         resets the iframe body + adopts Figma's theme so the app sits flush in the panel. */
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; }
      body { background: var(--figma-color-bg, #fff); color: var(--figma-color-text, #1e1e1e); }
    </style>
  </head>
  <body>
    <!-- The shared web/src/main.ts mounts on #app (docs/22 #110 — one UI, no fork). The build
         inlines the bundled JS in place of this dev-only module tag. -->
    <div id="app"></div>
    <script type="module" src="./ui.ts"></script>
  </body>
</html>
